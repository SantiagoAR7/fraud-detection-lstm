name: CI — Fraud Detection API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install base dependencies
        run: pip install pytest httpx fastapi pydantic scikit-learn joblib numpy prometheus-fastapi-instrumentator prometheus-client

      - name: Install PyTorch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: api

      - name: Verify Dockerfile exists
        run: test -f Dockerfile && echo "Dockerfile found ✅"